<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Star Chef - AI Menu Engine v0.5 正式系统骨架</title>
  <style>
    :root {
      --ink:#102033;
      --muted:#64748b;
      --brand:#0f6387;
      --brand-dark:#104e68;
      --line:#d8e3ec;
      --bg:#eef5f8;
      --surface:#ffffff;
      --ok:#11794f;
      --ok-bg:#effaf5;
      --warn:#9a5b00;
      --warn-bg:#fff8e6;
      --bad:#b42318;
      --bad-bg:#fff0ed;
      color-scheme: light;
    }
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; color:var(--ink); background:var(--bg); overflow-x:hidden; }
    header { background:#104e68; color:white; padding:22px 28px; display:flex; justify-content:space-between; gap:18px; align-items:flex-start; }
    header > div { min-width:0; }
    header h1 { margin:0 0 6px; font-size:30px; line-height:1.18; }
    header p { margin:0; color:#d8edf6; max-width:820px; line-height:1.65; overflow-wrap:break-word; }
    header nav { display:flex; flex-wrap:wrap; gap:8px; justify-content:flex-end; }
    header nav a, header nav button { border:1px solid rgba(255,255,255,.36); background:rgba(255,255,255,.12); color:white; border-radius:9px; padding:9px 11px; text-decoration:none; font-weight:800; font:inherit; cursor:pointer; }
    main { display:grid; grid-template-columns:260px minmax(0,1fr); gap:18px; max-width:1480px; margin:0 auto; padding:18px; }
    aside, section { background:var(--surface); border:1px solid var(--line); border-radius:8px; overflow:hidden; }
    aside { align-self:start; position:sticky; top:12px; }
    .panel-head { display:flex; justify-content:space-between; align-items:center; gap:10px; padding:15px 16px; border-bottom:1px solid var(--line); background:#f8fbfd; }
    .panel-head h2, .panel-head h3 { margin:0; font-size:19px; }
    .panel-body { padding:16px; }
    #role-switcher { display:grid; gap:9px; padding:12px; }
    #role-switcher button { width:100%; border:1px solid var(--line); background:white; border-radius:8px; padding:11px; text-align:left; cursor:pointer; }
    #role-switcher button.active { border-color:#0f6387; background:#eaf7fd; box-shadow:inset 4px 0 0 #0f6387; }
    #role-switcher strong, #role-switcher span { display:block; }
    #role-switcher span { color:var(--muted); font-size:12px; margin-top:4px; }
    .content { display:grid; gap:18px; min-width:0; }
    .hero-grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
    #score-card { display:grid; grid-template-columns:150px minmax(0,1fr); gap:18px; align-items:center; }
    .score-ring { width:132px; height:132px; border-radius:50%; display:grid; place-items:center; background:conic-gradient(#0f6387 calc(var(--score) * 1%), #dbe8ef 0); position:relative; }
    .score-ring::after { content:""; position:absolute; inset:12px; background:white; border-radius:50%; }
    .score-ring b, .score-ring span { position:relative; z-index:1; display:block; text-align:center; }
    .score-ring b { font-size:36px; color:var(--brand); }
    .score-ring span { font-size:12px; color:var(--muted); margin-top:46px; position:absolute; }
    .meta-row { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
    .meta-row span, .pill { border:1px solid var(--line); background:#f8fbfd; border-radius:999px; padding:6px 9px; font-size:13px; color:#21445a; font-weight:750; }
    .role-lists { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px; margin-top:10px; }
    .role-lists div { border:1px solid var(--line); border-radius:8px; padding:10px; background:#fbfdff; }
    .role-lists b, .role-lists span { display:block; }
    .role-lists b { margin-bottom:6px; color:var(--brand); }
    .role-lists span { color:#334155; font-size:13px; line-height:1.5; }
    .pipeline { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:10px; }
    .line-card { border:1px solid var(--line); border-radius:8px; padding:12px; background:#fbfdff; display:grid; gap:8px; min-width:0; }
    .line-card h4, .line-card p { margin:0; }
    .line-card p, .line-card small { color:var(--muted); line-height:1.45; }
    .line-card strong { font-size:24px; color:var(--brand); }
    .status { display:inline-flex; width:max-content; align-items:center; border-radius:999px; padding:4px 8px; font-size:12px; font-weight:900; border:1px solid var(--line); }
    .status.ok { color:var(--ok); background:var(--ok-bg); border-color:#a7e4c4; }
    .status.warn { color:var(--warn); background:var(--warn-bg); border-color:#f1d38b; }
    .status.bad { color:var(--bad); background:var(--bad-bg); border-color:#fec5bd; }
    .table-wrap { overflow-x:auto; border:1px solid var(--line); border-radius:8px; }
    table { width:100%; border-collapse:collapse; min-width:1040px; font-size:14px; }
    th, td { border-bottom:1px solid var(--line); padding:10px 11px; text-align:left; vertical-align:top; line-height:1.45; }
    th { background:#eef6fb; color:#14364d; font-size:13px; }
    td small { display:block; color:var(--muted); margin-top:4px; }
    button { font:inherit; }
    .actions-cell { white-space:nowrap; }
    .actions-cell button, .approval button, .primary-action { border:1px solid #0f6387; background:#0f6387; color:white; border-radius:8px; padding:7px 10px; cursor:pointer; font-weight:850; }
    .actions-cell button + button { margin-left:6px; background:#fff; color:#0f6387; }
    button:disabled { opacity:.42; cursor:not-allowed; }
    .two-col { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
    #gate-panel, #approval-flow, #launch-checks { display:grid; gap:10px; }
    .gate, .approval, .check-row { border:1px solid var(--line); border-radius:8px; padding:11px; background:#fbfdff; }
    .gate { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; }
    .gate.ok { border-color:#a7e4c4; background:#f4fbf7; }
    .gate.warn { border-color:#f1d38b; background:#fffaf0; }
    .gate.bad { border-color:#fec5bd; background:#fff6f4; }
    .gate h4, .gate p, .approval h4, .approval p { margin:0; }
    .gate p, .approval p { color:#475569; line-height:1.5; margin-top:4px; }
    .gate small { color:var(--muted); display:block; margin-top:6px; }
    .approval { display:grid; grid-template-columns:34px minmax(0,1fr) auto; gap:12px; align-items:start; }
    .approval b { width:28px; height:28px; border-radius:50%; display:grid; place-items:center; background:#eaf7fd; color:#0f6387; }
    .check-row { display:grid; grid-template-columns:auto minmax(0,1fr) auto; gap:8px; align-items:center; cursor:pointer; }
    .check-row small { color:var(--muted); }
    .audit { margin:0; padding-left:18px; color:#334155; line-height:1.6; }
    @media (max-width: 1080px) {
      main { grid-template-columns:1fr; }
      aside { position:static; }
      .hero-grid, .two-col, .role-lists, .pipeline { grid-template-columns:1fr; }
    }
    @media (max-width: 620px) {
      header { display:block; padding:20px 16px; }
      header h1 { font-size:25px; }
      header p { font-size:15px; line-height:1.55; }
      header nav { justify-content:flex-start; margin-top:14px; }
      header nav a, header nav button { white-space:nowrap; }
      main { padding:12px; }
      #score-card { grid-template-columns:1fr; }
      .score-ring { width:118px; height:118px; }
      .panel-head { display:block; }
      .panel-head .pill { display:inline-flex; margin-top:8px; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Star Chef - AI Menu Engine v0.5 正式系统骨架</h1>
      <p>从评审原型进入上线最小闭环：角色权限、项目主档、数据导入、菜名映射、数据质量门禁、审批流和上线检查清单。</p>
    </div>
    <nav>
      <a href="./">返回首页</a>
      <a href="./v04-system-build.html">0.4 建设包</a>
      <button id="reset-demo">重置演示状态</button>
    </nav>
  </header>
  <main>
    <aside>
      <div class="panel-head"><h2>角色</h2><span class="pill">企业微信权限预演</span></div>
      <div id="role-switcher"></div>
    </aside>
    <div class="content">
      <section>
        <div class="panel-body hero-grid">
          <div id="score-card"></div>
          <div id="role-panel"></div>
        </div>
      </section>
      <section>
        <div class="panel-head"><h2>1. 数据导入管道</h2><span class="pill">正式上线先导入，不先全自动</span></div>
        <div class="panel-body"><div id="import-streams" class="pipeline"></div></div>
      </section>
      <section>
        <div class="panel-head"><h2>2. 标准菜名映射台</h2><span class="pill">P0：真实毛利前置条件</span></div>
        <div class="panel-body"><div id="mapping-table" class="table-wrap"></div></div>
      </section>
      <div class="two-col">
        <section>
          <div class="panel-head"><h2>3. 数据质量门禁</h2><span class="pill">不通过不计算真实毛利</span></div>
          <div class="panel-body"><div id="gate-panel"></div></div>
        </section>
        <section>
          <div class="panel-head"><h2>4. 审批流预演</h2><span class="pill">企业微信待接入</span></div>
          <div class="panel-body"><div id="approval-flow"></div></div>
        </section>
      </div>
      <div class="two-col">
        <section>
          <div class="panel-head"><h2>5. 上线检查清单</h2><button id="export-checklist" class="primary-action">导出清单</button></div>
          <div class="panel-body"><div id="launch-checks"></div></div>
        </section>
        <section>
          <div class="panel-head"><h2>6. 审计日志</h2><span class="pill">未来落库</span></div>
          <div class="panel-body"><ol id="audit-log" class="audit"></ol></div>
        </section>
      </div>
    </div>
  </main>
  <script src="./v05-production-data.js"></script>
  <script src="./v05-production-app.js"></script>
</body>
</html>
